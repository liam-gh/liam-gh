
name: Update WakaTime stats

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: all_time
          SHOW_TITLE: true
          SHOW_TOTAL: true
          SHOW_TIME: true
          LANG_COUNT: 6
          BLOCKS: "->"
          CODE_LANG: txt
          COMMIT_MESSAGE: "chore: update WakaTime stats"

